<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SA TV</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00f0ff;
            --secondary-glow: #ff0055;
            --bg-dark: #06060c;
            --card-bg: rgba(18, 18, 29, 0.6);
        }
        
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #121225 0%, var(--bg-dark) 70%);
            overflow-x: hidden;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 20px;
            margin: 0;
        }
        
        .tv-area {
            margin-top: 10px !important;
            padding: 0 15px;
        }
        .tv-view {
            margin-bottom: 15px !important;
        }
        
        /* 📺 ভিডিও প্লেয়ার এরিয়া (সোজা স্ক্রিন ও পিসির জন্য সাইজ ফিক্সড) */
        .video-container-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* ১৬:৯ পারফেক্ট রেশিও */
            border: 2px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
            background: #000;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px rgba(0, 240, 255, 0.1);
        }
        
        /* ভিডিও আইফ্রেম স্টাইল (ভিডিও কাটা যাবে না, সম্পূর্ণ ফিট হবে) */
        iframe {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border: 0 !important;
            display: block;
            object-fit: fill !important; /* ভিডিওর রেশিও স্ক্রিন অনুযায়ী ফিল করবে */
        }

        /* ইন্ট্রো লোডার */
        #intro-loader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #040406;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999999;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .loader-content { text-align: center; }
        .welcome-text { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px; font-weight: bold; }
        .brand-text { font-size: 36px; font-weight: 900; color: #fff; margin: 0; letter-spacing: 1px; }
        .brand-text span { color: var(--primary-glow); text-shadow: 0 0 15px rgba(0,240,255,0.5); }
        .loading-dots { display: flex; justify-content: center; gap: 6px; margin-top: 15px; }
        .loading-dots span { width: 6px; height: 6px; background-color: var(--secondary-glow); border-radius: 50%; animation: dotPulse 1.2s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -.32s; background-color: var(--primary-glow); }
        .loading-dots span:nth-child(2) { animation-delay: -.16s; }
        @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* কালারফুল হেডার */
        .top-bar-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
            margin: 10px 0 15px;
            padding: 15px 20px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(25, 20, 45, 0.8) 0, rgba(10, 10, 18, 0.9) 100%);
            border: 1px solid rgba(0, 240, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .logo-link { text-decoration: none !important; display: flex; align-items: center; }
        
        .brand-sa { 
            font-size: 30px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #ff0055, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.5));
            letter-spacing: 1px;
        }
        .brand-live { 
            font-size: 30px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #00f0ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.5));
            margin-left: 5px;
        }
        
        /* সার্চ বার */
        .channel-search-box-premium { position: relative; width: 220px; }
        .channel-search-box-premium input {
            width: 100%; height: 42px; padding: 0 38px 0 15px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.5); color: #fff; font-size: 13px; outline: 0;
            transition: all 0.25s ease;
        }
        .channel-search-box-premium input:focus { 
            border-color: var(--primary-glow); 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            background: rgba(0, 0, 0, 0.7);
        }
        .search-icon-inside { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.8; }

        /* নোটিশ বার */
        .marquee-container {
            background: rgba(13, 13, 19, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-left: 4px solid var(--secondary-glow);
            color: #fff;
            padding: 12px 0;
            display: flex;
            align-items: center;
            border-radius: 10px;
            margin-bottom: 18px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .notice-label {
            background: linear-gradient(135deg, var(--secondary-glow), #ff5500);
            color: #fff;
            padding: 4px 14px;
            margin-left: 15px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 10px rgba(255, 0, 85, 0.3);
        }
        .marquee-container marquee { flex: 1; padding: 0 15px; font-size: 13px; color: #e2e8f0; font-weight: 500; }

        /* চ্যানেল লিস্ট */
        .channel-list {
            max-height: 500px !important;
            overflow-y: auto !important;
            padding: 0 5px 0 0;
            margin-bottom: 15px;
        }
        .channel-list::-webkit-scrollbar { width: 5px; }
        .channel-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.4); border-radius: 10px; }
        
        .thumbnail-slider { list-style: none; padding: 0; margin: 0; }
        .thumbnail-slider li {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        .thumbnail-slider li:hover, .thumbnail-slider li:focus {
            border-color: var(--primary-glow);
            background: rgba(22, 23, 38, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.1);
            outline: 0;
        }
        .thumbnail-slider li img { 
            width: 42px; height: 42px; 
            border-radius: 8px; 
            object-fit: cover; 
            flex-shrink: 0; 
            border: 1px solid rgba(255,255,255,0.08);
            background: #000;
        }
        .channel-info-box { min-width: 0; flex: 1; }
        .channel-title { color: #f1f5f9; font-size: 13px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* মোবাইল স্ক্রিন সাইজ (Portrait - সোজা অবস্থা) */
        @media(max-width: 767px) {
            .top-bar-wrapper { padding: 12px 15px; border-radius: 12px; }
            .brand-sa, .brand-live { font-size: 24px; }
            .channel-search-box-premium { width: 140px; }
            .channel-search-box-premium input { height: 38px; border-radius: 8px; font-size: 12px; }
            .channel-list { max-height: 350px !important; margin-top: 5px; padding-right: 0; }
            .thumbnail-slider li { padding: 8px; margin-bottom: 8px; }
            .thumbnail-slider li img { width: 36px; height: 36px; }
            .channel-title { font-size: 12px; }
        }

        /* 🚨 মোবাইল ল্যান্ডস্কেপ (Rotate অবস্থা) আল্ট্রা ফুল স্ক্রিন ইঞ্জিন ফিক্স */
        @media (max-width: 950px) and (orientation: landscape) {
            body { padding: 0 !important; margin: 0 !important; overflow: hidden !important; background: #000 !important; }
            .tv-area { margin: 0 !important; padding: 0 !important; width: 100vw !important; height: 100vh !important; max-width: 100% !important; }
            .row { margin: 0 !important; padding: 0 !important; }
            
            /* ল্যান্ডস্কেপে অপ্রয়োজনীয় এলিমেন্ট হাইড */
            .top-bar-wrapper, .marquee-container, .channel-list { display: none !important; }
            
            /* প্লেয়ারকে পুরো মোবাইল স্ক্রিনের সাইজ দেওয়া হলো */
            .tv-view { 
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                margin: 0 !important;
                padding: 0 !important;
                z-index: 999999 !important;
            }
            .video-container-box { 
                border: none !important; 
                border-radius: 0 !important; 
                width: 100% !important;
                height: 100% !important; 
                padding-top: 0 !important; /* প্যাডিং ওভাররাইড */
            }
        }
    </style>
</head>
<body>

    <div id="intro-loader"><div class="loader-content"><div class="welcome-text">Welcome To</div><h1 class="brand-text">SA <span>TV</span></h1><div class="loading-dots"><span></span><span></span><span></span></div></div></div>
    
    <div class="container-fluid tv-area">
        <div class="row">
            <div class="col-md-12">
                <div class="top-bar-wrapper">
                    <a href="#" class="logo-link">
                        <div>
                            <span class="brand-sa">SA</span><span class="brand-live">TV</span>
                        </div>
                    </a>
                    <div class="channel-search-box-premium">
                        <input type="text" id="channelSearch" placeholder="Search channel..." autocomplete="off">
                        <svg class="search-icon-inside" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.5 21C16.7467 21 21 16.7467 21 11.5C21 6.25329 16.7467 2 11.5 2C6.25329 2 2 6.25329 2 11.5C2 16.7467 6.25329 21 11.5 21Z" stroke="#00f0ff" stroke-width="2.5"/><path d="M22 22L20 20" stroke="#00f0ff" stroke-width="2.5"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="marquee-container">
                    <div class="notice-label">NOTICE</div>
                    <marquee scrollamount="5" onmouseover="this.stop()" onmouseout="this.start()">⚠️ প্রিয় দর্শক, আপনাদের বিনোদনের সেরা সঙ্গী SA TV। এখানে উপভোগ করুন লাইভ টিভি, স্পোর্টস, মুভি ও আরও অনেক কিছু। <span style="color:#00f0ff;font-weight:700;"> টিভি চ্যানেল প্লে হতে ৫ থেকে ১০ সেকেন্ড টাইম নিতে পারে। </span> 💡 কোনো চ্যানেল সাময়িকভাবে কাজ না করলে একটু পর আবার চেষ্টা করুন। <span style="color:#00FF00;font-weight:700;"> ধন্যবাদ আমাদের সাথে থাকার জন্য ❤️ </span></marquee>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xs-12 col-md-9 tv-view">
                <div class="video-container-box">
                    <iframe id="tv-player-iframe" name="player" allowfullscreen allow="autoplay; encrypted-media" src=""></iframe>
                </div>
            </div>
            <div class="col-xs-12 col-md-3">
                <div class="channel-list">
                    <ul class="thumbnail-slider" id="channel-container">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
    // সিকিউরিটি লেয়ার
    !function(){"use strict";if(window.location.protocol==="view-source:"){window.location.href="#"}console.clear();console.log=function(){};console.warn=function(){};console.error=function(){};function debuggerCheck(){var start=performance.now();debugger;var end=performance.now();if(end-start>100){window.location.href="about:blank"}}setInterval(debuggerCheck,1e3);document.addEventListener('keydown',function(e){var key=e.keyCode||e.which;if(key===123||(e.ctrlKey&&e.shiftKey&&(key===73||key===74))||(e.ctrlKey&&key===85)||(e.ctrlKey&&key===83)){e.preventDefault();return false}});document.addEventListener('contextmenu',function(e){e.preventDefault();return false})}();
    
    // গিটহাব র (Raw) লিঙ্ক
    const RAW_M3U_URL = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';
    
    const container = document.getElementById('channel-container');
    const searchInput = document.getElementById('channelSearch');
    const playerIframe = document.getElementById('tv-player-iframe');
    
    function parseM3U(data) {
        const channels = [];
        const lines = data.split('\n');
        let currentChannel = null;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            if (line.toUpperCase().startsWith('#EXTINF:')) {
                currentChannel = { name: "Live Channel", image: "", url: "" };
                const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                if (logoMatch) currentChannel.image = logoMatch[1];
                
                const nameIndex = line.lastIndexOf(',');
                if (nameIndex !== -1) currentChannel.name = line.substring(nameIndex + 1).trim();
            } else if (line.startsWith('http://') || line.startsWith('https://')) {
                if (currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
        }
        return channels;
    }

    function renderChannels(channels){
        container.innerHTML = '';
        if(!channels || channels.length === 0){
            container.innerHTML = '<p style="color:#aaa;text-align:center;padding:15px;">⚠️ কোনো চ্যানেল পাওয়া যায়নি।</p>';
            return;
        }
        
        if(playerIframe && playerIframe.src === "" && channels[0].url) {
            playerIframe.src = channels[0].url;
        }

        channels.forEach((channel) => {
            const li = document.createElement('li');
            li.setAttribute('tabindex', '0');
            const imgUrl = channel.image || 'https://i.postimg.cc/mD1VCt2C/RS-Live.png';
            
            li.innerHTML = `<img src="${imgUrl}" alt="${channel.name}" onerror="this.src='https://i.postimg.cc/mD1VCt2C/RS-Live.png';"><div class="channel-info-box"><p class="channel-title">${channel.name}</p></div>`;
            
            li.addEventListener('click', function(){
                playerIframe.src = channel.url;
                if(window.innerWidth < 768) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
            container.appendChild(li);
        });
        
        if(searchInput) {
            searchInput.addEventListener('input', function(){
                const filter = this.value.toLowerCase().trim();
                const items = container.querySelectorAll('li');
                items.forEach(item => {
                    const titleText = item.querySelector('.channel-title').textContent.toLowerCase();
                    item.style.display = titleText.includes(filter) ? '' : 'none';
                });
            });
        }
    }
    
    function hideLoader() {
        const loader = document.getElementById('intro-loader');
        if(loader){
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            setTimeout(() => loader.remove(), 300);
        }
    }
    
    function loadChannels() {
        setTimeout(hideLoader, 1000);

        fetch(`${RAW_M3U_URL}?_=${Date.now()}`)
            .then(res => {
                if(!res.ok) throw new Error();
                return res.text();
            })
            .then(text => {
                if(text) renderChannels(parseM3U(text));
            })
            .catch(() => {
                fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(RAW_M3U_URL)}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.contents) renderChannels(parseM3U(data.contents));
                    })
                    .catch(() => {
                        container.innerHTML = `<p style="color:#aaa;text-align:center;padding:15px;">⚠️ চ্যানেল লোড হতে সমস্যা হচ্ছে।</p>`;
                    });
            });
    }

    window.addEventListener('DOMContentLoaded', loadChannels);
    </script>
</body>
</html>
