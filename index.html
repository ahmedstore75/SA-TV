<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SA TV - Premium Ultimate</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <!-- Clappr Player CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        :root { 
            --primary-glow: #00f0ff; 
            --secondary-glow: #ff0055;
            --bg-dark: #06060c; 
            --card-bg: rgba(18, 18, 29, 0.6); 
            --text-red: #ff3333;
        }
        
        html, body {
            width: 100%; height: 100vh; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
        }
        
        body { 
            -webkit-user-select: none; user-select: none; 
            display: flex; flex-direction: column;
        }

        /* 📌 ফিক্সড হেডার ও নোটিশ এরিয়া */
        .fixed-top-section {
            flex-shrink: 0;
            background: #06060c;
            z-index: 100;
        }
        
        .main-header {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand-logo { font-size: 20px; font-weight: 900; letter-spacing: 0.5px; }
        .brand-sa { color: var(--secondary-glow); }
        .brand-live { color: var(--primary-glow); }
        
        /* 🔍 আপগ্রেডেড রেসপন্সিভ সার্চ বক্স */
        .search-box {
            width: 140px; height: 34px; border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.25);
            background: rgba(255, 255, 255, 0.06); color: #fff;
            padding: 0 15px; font-size: 12px; outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .search-box:focus { 
            border-color: var(--primary-glow); 
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            width: 160px;
        }
        .search-box::placeholder { color: rgba(255, 255, 255, 0.5); }

        /* 📜 আপগ্রেডেড নোটিশ বার (নন-স্টপ স্ক্রোলিং ইঞ্জিন) */
        .notice-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 15px; background: rgba(13, 13, 19, 0.8);
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            overflow: hidden; /* বাইরের অংশ হাইড রাখবে */
        }
        .notice-tag { 
            background: var(--text-red); color: white; 
            padding: 2px 6px; border-radius: 4px; font-size: 10px; 
            font-weight: bold; text-transform: uppercase; white-space: nowrap;
            z-index: 10; /* নোটিশ ট্যাগটি টেক্সটের উপরে ভাসমান থাকবে */
        }
        
        /* 🚀 নতুন সিএসএস মার্কি টেক্সট কন্টেইনার */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
            display: flex;
        }
        .marquee-text {
            display: inline-block;
            color: var(--text-red); 
            font-weight: bold; font-size: 11px;
            padding-left: 100%;
            animation: continuousMarquee 25s linear infinite; /* ২৫ সেকেন্ড পর পর আনলিমিটেড ঘুরবে */
        }
        @keyframes continuousMarquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* 💻 মেইন লেআউট কন্টেইনার */
        .main-content-layout {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            height: calc(100vh - 85px);
        }

        /* 📺 ভিডিও প্লেয়ার কন্টেইনার */
        .player-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000;
            flex-shrink: 0; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #player { width: 100% !important; height: 100% !important; }

        /* 🔊 আনমিউট ওভারলে */
        #unmute-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            z-index: 99; cursor: pointer;
        }
        .unmute-btn {
            background: linear-gradient(135deg, var(--secondary-glow), #ff5500);
            color: #fff; padding: 10px 20px; border-radius: 25px;
            font-weight: bold; font-size: 12px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
            display: flex; align-items: center; gap: 6px;
            animation: pulseBtn 1.5s infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 📁 ডানদিকের অংশ (ক্যাটাগরি + চ্যানেল লিস্ট) */
        .list-side-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        /* 📁 স্ক্রোলিং ক্যাটাগরি বার */
        .category-container {
            display: flex; gap: 6px; overflow-x: auto; padding: 12px 15px;
            background: #06060c; flex-shrink: 0;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-container::-webkit-scrollbar { display: none; }
        .category-btn {
            background: rgba(255, 255, 255, 0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 11px;
            white-space: nowrap; transition: all 0.2s;
        }
        .category-btn.active {
            background: var(--primary-glow); color: #000; font-weight: bold; border-color: var(--primary-glow);
        }

        /* 📜 চ্যানেল লিস্ট কন্টেইনার */
        .channel-list-container {
            flex-grow: 1; overflow-y: auto; padding: 0 15px 15px;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 8px;
        }

        .thumbnail-card {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-bg); padding: 10px; border-radius: 10px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s ease; justify-content: space-between;
        }
        .card-left { display: flex; align-items: center; gap: 12px; }
        .thumbnail-card img { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; background: #111; }
        .channel-name { font-size: 13px; font-weight: 600; margin: 0; color: #fff; }

        /* 🔴 একটিভ চ্যানেল ক্লিক চিহ্ন */
        .thumbnail-card.active-play {
            background: rgba(0, 240, 255, 0.12);
            border: 1px solid var(--primary-glow);
            box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.2);
        }
        .thumbnail-card.active-play .channel-name { color: var(--primary-glow); }
        
        .live-indicator {
            display: none; background: rgba(255, 0, 85, 0.15); color: var(--secondary-glow);
            font-size: 9px; font-weight: bold; padding: 3px 6px; border-radius: 4px;
            border: 1px solid rgba(255, 0, 85, 0.3); letter-spacing: 0.5px;
            animation: pulseLive 1s infinite alternate;
        }
        .thumbnail-card.active-play .live-indicator { display: inline-block; }

        @keyframes pulseLive {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 💻 ল্যাপটপ এবং ডেস্কটপ স্ক্রিনের জন্য ফিক্সড ডুয়াল প্যানেল লেআউট */
        @media (min-width: 992px) {
            .main-content-layout {
                flex-direction: row;
            }
            .player-wrapper {
                width: 65%;
                height: 100%;
                aspect-ratio: auto;
            }
            .list-side-container {
                width: 35%;
                height: 100%;
                border-left: 1px solid rgba(255, 255, 255, 0.05);
            }
            .search-box { width: 160px; }
            .search-box:focus { width: 200px; }
        }

        @media (min-width: 600px) and (max-width: 991px) {
            .channel-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ল্যান্ডস্কেপ ফুলস্ক্রিন */
        body.fullscreen-mode .fixed-top-section, 
        body.fullscreen-mode .list-side-container { display: none !important; }
        body.fullscreen-mode .player-wrapper { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 99999; }
        body.fullscreen-mode #player, body.fullscreen-mode video { width: 100vw !important; height: 100vh !important; object-fit: fill !important; }
    </style>
</head>
<body>

    <!-- হেডার ও নোটিশ এরিয়া -->
    <div class="fixed-top-section">
        <div class="main-header">
            <div class="brand-logo"><span class="brand-sa">SA</span><span class="brand-live">TV</span></div>
            <input type="text" class="search-box" id="channelSearch" placeholder="Search channel...">
        </div>
        <div class="notice-bar">
            <div class="notice-tag">NOTICE</div>
            <!-- 🚀 আপগ্রেডেড নন-স্টপ স্ক্রোলিং টেক্সট ইঞ্জিন -->
            <div class="marquee-container">
                <div class="marquee-text">⚠️ প্রিয় দর্শক, আপনাদের বিনোদনের সেরা সঙ্গী SA TV। কোনো চ্যানেল সাময়িকভাবে কাজ না করলে একটু পর আবার চেষ্টা করুন। ধন্যবাদ আমাদের সাথে থাকার জন্য ❤️</div>
            </div>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট লেআউট -->
    <div class="main-content-layout">
        
        <!-- 📺 বাম পাশে ভিডিও প্লেয়ার অংশ -->
        <div class="player-wrapper">
            <div id="player"></div>
            <div id="unmute-overlay" onclick="handleUnmute()">
                <div class="unmute-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM12 4L9.91 6.09 12 8.18V4zm-7.7 1.49L3 6.79 7.21 11H3v2h4l5 5v-6.18l4.18 4.18c-.5.33-1.05.59-1.68.72v2.03c1.17-.23 2.25-.79 3.14-1.57l2.55 2.55 1.29-1.29L4.3 5.49z"/></svg>
                    টাচ করে সাউন্ড অন করুন
                </div>
            </div>
        </div>

        <!-- 📁 ডান পাশে ক্যাটাগরি ও চ্যানেল লিস্ট অংশ -->
        <div class="list-side-container">
            <!-- ক্যাটাগরি বার -->
            <div class="category-container" id="category-bar">
                <button class="category-btn active" id="btn-ALL" onclick="filterCategory('ALL')">ALL</button>
            </div>

            <!-- চ্যানেল লিস্ট এরিয়া -->
            <div class="channel-list-container">
                <div class="channel-grid" id="channel-container"></div>
            </div>
        </div>

    </div>

    <script>
        let mainPlayer = null;
        let allChannels = [];
        let currentUrl = ""; 
        const RAW_M3U_URL = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';

        function initPlayer(url, startMuted = true) {
            currentUrl = url;
            if(mainPlayer) mainPlayer.destroy();
            
            mainPlayer = new Clappr.Player({
                source: url,
                parentId: "#player",
                width: '100%',
                height: '100%',
                autoPlay: true,
                mute: startMuted,
                allowfullscreen: true,
                playback: { playInline: true, recycleVideo: true }
            });

            const overlay = document.getElementById('unmute-overlay');
            if(!startMuted && overlay) { overlay.style.display = 'none'; }
            else if (overlay) { overlay.style.display = 'flex'; }

            setTimeout(() => {
                const video = document.querySelector('#player video');
                if (video) {
                    video.style.setProperty('object-fit', 'fill', 'important');
                    video.play().catch(() => {});
                }
            }, 600);

            updateActiveChannelUI();
        }

        function handleUnmute() {
            const video = document.querySelector('#player video');
            if (video) {
                video.muted = false;
                mainPlayer.setVolume(100);
            }
            document.getElementById('unmute-overlay').style.display = 'none';
        }

        function checkOrientation() {
            if (window.innerWidth > window.innerHeight && window.innerWidth < 1024) {
                document.body.classList.add('fullscreen-mode');
            } else {
                document.body.classList.remove('fullscreen-mode');
            }
        }
        window.addEventListener('resize', checkOrientation);

        // M3U প্লেলিস্ট লোডার
        fetch(RAW_M3U_URL).then(res => res.text()).then(data => {
            const lines = data.split('\n');
            let catSet = new Set();
            let current = null;

            for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim();
                if(line.toUpperCase().startsWith('#EXTINF:')) {
                    current = { name: "Live Channel", logo: "https://i.postimg.cc/mD1VCt2C/RS-Live.png", cat: "OTHERS" };
                    let logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                    if (logoMatch) current.logo = logoMatch[1];
                    let groupMatch = line.match(/group-title="([^"]+)"/i);
                    if (groupMatch) {
                        current.cat = groupMatch[1].toUpperCase();
                        catSet.add(groupMatch[1].toUpperCase());
                    }
                    let nameIdx = line.lastIndexOf(',');
                    if (nameIdx !== -1) current.name = line.substring(nameIdx + 1).trim();
                } else if(line.startsWith('http')) {
                    if(current) {
                        current.url = line;
                        allChannels.push(current);
                        current = null;
                    }
                }
            }
            
            const catBar = document.getElementById('category-bar');
            catSet.forEach(c => {
                catBar.innerHTML += `<button class="category-btn" id="btn-${c.replace(/\s+/g, '')}" onclick="filterCategory('${c}')">${c}</button>`;
            });

            if(allChannels.length > 0) {
                renderList(allChannels);
                initPlayer(allChannels[0].url, true);
            }
        });

        function renderList(arr) {
            const container = document.getElementById('channel-container');
            container.innerHTML = arr.map(ch => `
                <div class="thumbnail-card" data-url="${ch.url}" onclick="initPlayer('${ch.url}', false)">
                    <div class="card-left">
                        <img src="${ch.logo}" onerror="this.src='https://i.postimg.cc/mD1VCt2C/RS-Live.png'">
                        <p class="channel-name">${ch.name}</p>
                    </div>
                    <span class="live-indicator">LIVE 🔴</span>
                </div>
            `).join('');
            
            updateActiveChannelUI();
        }

        function updateActiveChannelUI() {
            document.querySelectorAll('.thumbnail-card').forEach(card => {
                if(card.getAttribute('data-url') === currentUrl) {
                    card.classList.add('active-play');
                } else {
                    card.classList.remove('active-play');
                }
            });
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${cat.replace(/\s+/g, '')}`);
            if(activeBtn) activeBtn.classList.add('active');
            renderList(cat === 'ALL' ? allChannels : allChannels.filter(c => c.cat === cat));
        }

        document.getElementById('channelSearch').oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            renderList(allChannels.filter(c => c.name.toLowerCase().includes(query)));
        };
    </script>
</body>
</html>
