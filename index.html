<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SA TV - Premium Player</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <!-- Clappr Player CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        :root {
            --primary-glow: #00f0ff;
            --secondary-glow: #ff0055;
            --bg-dark: #06060c;
            --card-bg: rgba(18, 18, 29, 0.6);
        }
        
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden;
        }
        body { -webkit-user-select: none; user-select: none; padding-bottom: 20px; }
        .tv-area { margin-top: 10px !important; padding: 0 15px; }
        
        /* পোর্ট্রেট মোড প্লেয়ার */
        .video-container-box {
            position: relative; width: 100%; padding-top: 56.25%;
            border: 2px solid rgba(0, 240, 255, 0.2); border-radius: 16px;
            background: #000; overflow: hidden;
        }
        #player {
            position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important;
        }

        /* হেডার ও সার্চ */
        .top-bar-wrapper { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-radius: 16px; background: rgba(10, 10, 18, 0.9); border: 1px solid rgba(0, 240, 255, 0.25); margin-bottom: 15px; gap: 10px; }
        .brand-sa { font-size: 30px; font-weight: 900; background: linear-gradient(45deg, #ff0055, #ff5500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-live { font-size: 30px; font-weight: 900; background: linear-gradient(45deg, #00f0ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .channel-search-box-premium input { width: 180px; height: 42px; border-radius: 12px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding-left: 15px; outline: none; }
        
        /* 📁 ক্যাটাগরি সেকশন */
        .category-container {
            display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 12px; margin-bottom: 10px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-container::-webkit-scrollbar { display: none; }
        .category-btn {
            background: rgba(255, 255, 255, 0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600;
            white-space: nowrap; transition: all 0.2s ease;
        }
        .category-btn.active, .category-btn:hover {
            background: var(--primary-glow); color: #000; font-weight: 700; border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        /* চ্যানেল লিস্ট */
        .channel-list { max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--primary-glow); border-radius: 4px; }
        .thumbnail-slider { list-style: none; padding: 0; margin: 0; }
        .thumbnail-slider li { background: var(--card-bg); border-radius: 12px; padding: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .thumbnail-slider li:hover { border-color: var(--primary-glow); background: rgba(22, 23, 38, 0.9); }
        .thumbnail-slider li img { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; background: #000; }
        .channel-title { font-size: 13px; font-weight: 600; margin: 0; }

        /* 🚨 ল্যান্ডস্কেপ মোড - ফুল স্ক্রিন ইঞ্জিন */
        body.fullscreen-mode { padding: 0 !important; margin: 0 !important; overflow: hidden !important; }
        body.fullscreen-mode .top-bar-wrapper, body.fullscreen-mode .category-container, body.fullscreen-mode .channel-list { display: none !important; }
        body.fullscreen-mode .tv-area, body.fullscreen-mode .row, body.fullscreen-mode .col-md-9 { margin: 0 !important; padding: 0 !important; width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; z-index: 99999; }
        body.fullscreen-mode .video-container-box { border: none !important; border-radius: 0 !important; width: 100vw !important; height: 100vh !important; padding-top: 0 !important; }
        body.fullscreen-mode #player, body.fullscreen-mode video { width: 100vw !important; height: 100vh !important; object-fit: fill !important; }
    </style>
</head>
<body>

    <div class="container-fluid tv-area">
        <div class="row">
            <div class="col-md-12">
                <div class="top-bar-wrapper">
                    <div><span class="brand-sa">SA</span><span class="brand-live">TV</span></div>
                    <div class="channel-search-box-premium"><input type="text" id="channelSearch" placeholder="Search channel..."></div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- প্লেয়ার এরিয়া -->
            <div class="col-xs-12 col-md-9">
                <div class="video-container-box">
                    <div id="player"></div>
                </div>
            </div>
            
            <!-- ক্যাটাগরি ও চ্যানেল লিস্ট এরিয়া -->
            <div class="col-xs-12 col-md-3" style="margin-top: 15px;">
                <div class="category-container" id="category-bar">
                    <button class="category-btn active" onclick="filterCategory('ALL')">ALL</button>
                </div>
                <div class="channel-list">
                    <ul class="thumbnail-slider" id="channel-container"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
    let mainPlayer = null;
    let allChannels = [];
    const RAW_M3U_URL = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';

    // 🚀 হাইব্রিড অটো-প্লে ইঞ্জিন
    function initPlayer(videoUrl) {
        if (mainPlayer) {
            mainPlayer.destroy();
        }
        
        mainPlayer = new Clappr.Player({
            source: videoUrl,
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: true,  
            mute: true, // ব্রাউজার পলিসি বাইপাস করার জন্য প্রথমে মিউট করে স্টার্ট হবে
            allowfullscreen: true,
            playback: {
                playInline: true,
                recycleVideo: true
            }
        });

        // জোরপূর্বক স্ক্রিন ফিট এবং অটো-আনমিউট ট্রিপল লেয়ার মেকানিজম
        setTimeout(() => {
            const videoElement = document.querySelector('#player video');
            if (videoElement) {
                videoElement.style.setProperty('object-fit', 'fill', 'important');
                
                // ব্যাকগ্রাউন্ডে প্লে চালু করার কমান্ড
                videoElement.play().catch(() => {});
                
                // স্ক্রিনে ক্লিক বা টাচ করলেই স্বয়ংক্রিয়ভাবে সাউন্ড ফুল হয়ে যাবে
                const unMuteAction = () => {
                    videoElement.muted = false;
                    mainPlayer.setVolume(100);
                    window.removeEventListener('click', unMuteAction);
                    window.removeEventListener('touchstart', unMuteAction);
                };
                window.addEventListener('click', unMuteAction);
                window.addEventListener('touchstart', unMuteAction);
            }
        }, 600);
    }

    // স্ক্রিন রোটেশন ডিটেক্টর
    function checkOrientation() {
        if (window.innerWidth > window.innerHeight && window.innerWidth < 1024) {
            document.body.classList.add('fullscreen-mode');
        } else {
            document.body.classList.remove('fullscreen-mode');
        }
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('DOMContentLoaded', checkOrientation);

    // M3U প্লেলিস্ট পার্সার ও ক্যাটাগরি ইঞ্জিন
    fetch(RAW_M3U_URL)
        .then(res => res.text())
        .then(data => {
            const lines = data.split('\n');
            let current = null;
            let categories = new Set();
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.toUpperCase().startsWith('#EXTINF:')) {
                    current = { name: "Live Channel", image: "", url: "", category: "OTHERS" };
                    
                    // লোগো ডিটেকশন
                    let logo = line.match(/tvg-logo="([^"]+)"/i);
                    if (logo) current.image = logo[1];
                    
                    // গ্রুপ/ক্যাটাগরি ডিটেকশন
                    let group = line.match(/group-title="([^"]+)"/i);
                    if (group) {
                        current.category = group[1].toUpperCase();
                        categories.add(group[1].toUpperCase());
                    }
                    
                    let idx = line.lastIndexOf(',');
                    if (idx !== -1) current.name = line.substring(idx + 1).trim();
                } else if (line.startsWith('http')) {
                    if (current) { 
                        current.url = line; 
                        allChannels.push(current); 
                        current = null; 
                    }
                }
            }

            // ক্যাটাগরি বাটন তৈরি
            const categoryBar = document.getElementById('category-bar');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = cat;
                btn.onclick = () => filterCategory(cat, btn);
                categoryBar.appendChild(btn);
            });

            if (allChannels.length > 0) {
                initPlayer(allChannels[0].url); // প্রথম চ্যানেল অটো-প্লে
                renderChannels(allChannels);
            }
        });

    // চ্যানেল রেন্ডারিং ফাংশন
    function renderChannels(channels) {
        const container = document.getElementById('channel-container');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const li = document.createElement('li');
            li.innerHTML = `<img src="${ch.image || 'https://i.postimg.cc/mD1VCt2C/RS-Live.png'}" onerror="this.src='https://i.postimg.cc/mD1VCt2C/RS-Live.png'"><p class="channel-title">${ch.name}</p>`;
            li.addEventListener('click', () => {
                initPlayer(ch.url);
                if(window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            container.appendChild(li);
        });
    }

    // ক্যাটাগরি ফিল্টারিং ফিল্টার
    function filterCategory(category, element) {
        // একটিভ ক্লাস পরিবর্তন
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        if (element) element.classList.add('active');
        else document.querySelector('.category-btn').classList.add('active');

        if (category === 'ALL') {
            renderChannels(allChannels);
        } else {
            const filtered = allChannels.filter(ch => ch.category === category);
            renderChannels(filtered);
        }
    }

    // সার্চ ফিল্টার
    document.getElementById('channelSearch').addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannels(filtered);
    });
    </script>
</body>
</html>
