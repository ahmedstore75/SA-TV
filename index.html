<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SA TV - Premium</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        :root { --primary-glow: #00f0ff; --bg-dark: #06060c; --text-red: #ff3333; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* হেডার */
        .fixed-top-section { background: #06060c; border-bottom: 1px solid #222; padding: 8px 15px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        
        /* 🔴 বাম দিকে ছোট লাল নোটিশ ট্যাগ */
        .notice-tag { 
            display: inline-block; background: var(--text-red); color: white; 
            padding: 2px 8px; border-radius: 4px; font-size: 10px; 
            font-weight: bold; margin-top: 5px; text-transform: uppercase;
        }

        .brand-logo { font-size: 18px; font-weight: 900; }
        .search-box { width: 100px; height: 28px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; padding-left: 8px; font-size: 11px; }

        /* প্লেয়ার */
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; flex-shrink: 0; }
        #player { width: 100% !important; height: 100% !important; }

        /* লিস্ট */
        .category-container { display: flex; gap: 6px; overflow-x: auto; padding: 10px; }
        .category-btn { background: #1a1a2e; border: 1px solid #333; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 10px; }
        .channel-list-container { flex-grow: 1; overflow-y: auto; padding: 0 10px; }
        .thumbnail-card { display: flex; align-items: center; gap: 10px; background: #111; padding: 6px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; border: 1px solid #222; }
        .thumbnail-card img { width: 35px; height: 35px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="fixed-top-section">
        <div class="top-row">
            <div class="brand-logo"><span style="color:#ff0055">SA</span><span style="color:#00f0ff">TV</span></div>
            <input type="text" class="search-box" id="channelSearch" placeholder="Search...">
        </div>
        <!-- 🔴 আপনার সেই লাল নোটিশ ট্যাগ -->
        <div class="notice-tag">NOTICE</div>
    </div>

    <div class="player-wrapper">
        <div id="player"></div>
    </div>

    <div class="category-container" id="category-bar">
        <button class="category-btn active" onclick="filterCategory('ALL')">ALL</button>
    </div>

    <div class="channel-list-container" id="channel-container"></div>

    <script>
        let mainPlayer = null;
        let allChannels = [];
        const RAW_M3U_URL = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';

        function initPlayer(url) {
            if(mainPlayer) mainPlayer.destroy();
            mainPlayer = new Clappr.Player({source: url, parentId: "#player", width: '100%', height: '100%', autoPlay: true});
        }

        fetch(RAW_M3U_URL).then(res => res.text()).then(data => {
            const lines = data.split('\n');
            for(let i=0; i<lines.length; i++) {
                if(lines[i].startsWith('#EXTINF:')) {
                    let info = lines[i];
                    allChannels.push({
                        name: info.split(',')[1],
                        logo: (info.match(/tvg-logo="([^"]+)"/) || [])[1] || '',
                        url: lines[i+1]
                    });
                }
            }
            render(allChannels);
            initPlayer(allChannels[0].url);
        });

        function render(arr) {
            document.getElementById('channel-container').innerHTML = arr.map(ch => 
                `<div class="thumbnail-card" onclick="initPlayer('${ch.url}')">
                    <img src="${ch.logo}" onerror="this.src='https://i.postimg.cc/mD1VCt2C/RS-Live.png'">
                    <span style="font-size: 12px;">${ch.name}</span>
                </div>`).join('');
        }
        
        document.getElementById('channelSearch').oninput = (e) => {
            render(allChannels.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase())));
        };
    </script>
</body>
</html>
